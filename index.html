<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>potetin raider</title>
<style>
  :root { --bg: #0a0a0a; --panel: #141414; --border: #333; --text: #eaeaea; --accent: #00ffaa; --hover: #00cc88; }
  body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 260px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .nav-btn { background: none; border: none; color: var(--text); padding: 15px 20px; text-align: left; font-size: 15px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.2s; }
  .nav-btn:hover, .nav-btn.active { background: #222; border-left: 4px solid var(--accent); }
  #main { flex: 1; display: flex; flex-direction: column; }
  #content { flex: 1; padding: 30px; overflow-y: auto; }
  .section { display: none; }
  .section.active { display: block; }
  .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 6px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  h2 { margin-top: 0; color: var(--accent); font-weight: normal; font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
  label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
  input[type="text"], input[type="number"], textarea, select { width: 100%; background: #000; border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; font-family: monospace; outline: none; }
  input[type="text"]:focus, input[type="number"]:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  .row { display: flex; gap: 15px; }
  .row > div { flex: 1; }
  .checkbox-group { display: flex; align-items: center; margin-bottom: 15px; background: #000; padding: 10px; border-radius: 4px; border: 1px solid var(--border); }
  .checkbox-group input { margin: 0 10px 0 0; cursor: pointer; }
  .checkbox-group label { margin: 0; font-size: 14px; color: var(--text); cursor: pointer; }
  button.action { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
  button.action:hover { background: var(--hover); }
  button.secondary { background: #333; color: var(--text); }
  button.secondary:hover { background: #444; }
  #log-panel { height: 200px; background: #000; border-top: 1px solid var(--border); padding: 15px; font-family: monospace; font-size: 12px; color: #0f0; overflow-y: auto; white-space: pre-wrap; }
  .warn { color: #ffaa00; font-size: 11px; margin-top: -10px; margin-bottom: 10px; display: block; }
</style>
</head>
<body>

<div id="sidebar">
  <button class="nav-btn active" data-target="sec-core">主要設定 / ID設定</button>
  <button class="nav-btn" data-target="sec-msg">メッセージ設定</button>
  <button class="nav-btn" data-target="sec-transfer">転送設定</button>
  <button class="nav-btn" data-target="sec-react">リアクション設定</button>
  <button class="nav-btn" data-target="sec-thread">スレッド設定</button>
  <button class="nav-btn" data-target="sec-nick">ニックネーム設定</button>
  <button class="nav-btn" data-target="sec-event">イベント / 絵文字設定</button>
</div>

<div id="main">
  <div id="content">
    
    <div id="sec-core" class="section active">
      <div class="card">
        <h2>主要設定</h2>
        <label>T: (Tokenリスト 1行に1つ)</label>
        <textarea id="tokens" style="height: 120px;" placeholder="token1&#10;token2"></textarea>
      </div>
      <div class="card">
        <h2>ID設定</h2>
        <span class="warn">⚠️サーバーIDの入力が必要な機能があります</span>
        <div class="row">
          <div><label>サーバーID:</label><input type="text" id="server_id"></div>
          <div><label>チャンネルID:</label><input type="text" id="channel_id"></div>
        </div>
        <div class="row">
          <div><label>ユーザーID:</label><input type="text" id="user_id"></div>
          <div><label>非メンションブラックリストユーザーID:</label><input type="text" id="blacklist_id"></div>
        </div>
        <label>リアクション用チャンネル,メッセージID:</label>
        <input type="text" id="reaction_ids" placeholder="channel_id,message_id">
      </div>
    </div>

    <div id="sec-msg" class="section">
      <div class="card">
        <h2>メッセージ設定</h2>
        <label>発言内容:</label>
        <textarea id="msg_content"></textarea>
        
        <div class="row">
          <div>
            <label>発言回数:</label>
            <input type="number" id="msg_count" value="1">
            <span class="warn">⚠️回数が多いと処理が重くなります</span>
          </div>
          <div><label>遅延(ミリ秒):</label><input type="number" id="msg_delay" value="1000"></div>
        </div>
        
        <div class="row">
          <div><label>ランダムメンションの数:</label><input type="number" id="msg_mentions" value="0"></div>
          <div><label>ランダム文字数:</label><input type="number" id="rand_len" value="0"></div>
        </div>
        
        <div class="checkbox-group">
          <input type="checkbox" id="msg_poll"><label>投票を含める</label>
        </div>
        
        <div class="row">
          <div><label>投票タイトル:</label><input type="text" id="poll_title"></div>
          <div><label>開催期間 (秒):</label><input type="number" id="poll_duration" value="30"></div>
        </div>
        
        <label>投票の回答 (カンマ区切り):</label>
        <input type="text" id="poll_answers" placeholder="選択肢1,選択肢2">
        
        <label>取得する過去投票メッセージの量:</label>
        <input type="number" id="poll_past" value="0">
        <span class="warn">⚠️多い程自動で投票を終了させれる投票の数が増えますが処理が重くなります 0の場合は開票しない</span>
      </div>

      <div class="card">
        <h2>オプション設定</h2>
        <div class="row">
          <div>
            <label style="color:var(--accent);">＜通常オプション設定＞</label>
            <div class="checkbox-group"><input type="checkbox" id="opt_autodelay"><label>自動遅延調節:</label></div>
          </div>
          <div>
            <label style="color:var(--accent);">＜対策用オプション設定：⚠️対策の無い鯖では非推奨＞</label>
            <div class="checkbox-group"><input type="checkbox" id="opt_randchar"><label>ランダム文字追加 対BOT用:</label></div>
            <div class="checkbox-group"><input type="checkbox" id="opt_zerowidth"><label>ゼロ幅スペース追加 対BOT用:</label></div>
            <div class="checkbox-group"><input type="checkbox" id="opt_specialchar"><label>特殊記号追加 対AUTOMOD用:</label></div>
          </div>
        </div>
        
        <label>送信開始までの時間 (分後):</label>
        <input type="number" id="start_delay_min" value="0">
        <button class="action" id="btn_msg_send">送信開始(⚠️連打するとリクエストが2倍になります)</button>
        <button class="action secondary" id="btn_msg_type">入力中</button>
      </div>
    </div>

    <div id="sec-transfer" class="section">
      <div class="card">
        <h2>転送設定</h2>
        <div class="row">
          <div><label>転送元Guild ID:</label><input type="text" id="t_guild"></div>
          <div><label>転送元Channel ID:</label><input type="text" id="t_channel"></div>
          <div><label>転送元Message ID:</label><input type="text" id="t_msg"></div>
        </div>
        <div class="row">
          <div><label>転送遅延(ミリ秒):</label><input type="number" id="t_delay" value="1000"></div>
          <div><label>送信回数:</label><input type="number" id="t_count" value="1"></div>
        </div>
        <button class="action" id="btn_transfer">転送開始</button>
      </div>
    </div>

    <div id="sec-react" class="section">
      <div class="card">
        <h2>リアクション設定</h2>
        <label>標準絵文字 (,):</label>
        <textarea id="r_std">😀,😃,😄,😁,😆,😅,😂,🤣,😊,😇,🙂,🙃,😉,😌,😍,🥰,😘,😗,😙,😚</textarea>
        
        <label>カスタム絵文字 emoji_name:emoji_id (,):</label>
        <span class="warn">⚠️注意；カスタム絵文字はニトロ垢の場合のみ 通常の垢の場合は空にしてください</span>
        <textarea id="r_cus" placeholder="emoji_name:emoji_id"></textarea>
        
        <label>リアクション遅延 (ミリ秒):</label>
        <input type="number" id="r_delay" value="1000">
        
        <button class="action" id="btn_react">リアクション送信開始</button>
      </div>
    </div>

    <div id="sec-thread" class="section">
      <div class="card">
        <h2>スレッド設定</h2>
        <label>スレッドタイトル:</label>
        <input type="text" id="th_title">
        <label>スレッドのメッセージ:</label>
        <textarea id="th_msg"></textarea>
        <div class="row">
          <div><label>作成回数:</label><input type="number" id="th_count" value="1"></div>
          <div><label>遅延 (ミリ秒):</label><input type="number" id="th_delay" value="1000"></div>
          <div><label>スレッドのタイプ:</label>
            <select id="th_type">
              <option value="11">通常</option>
              <option value="10">アナウンス</option>
            </select>
          </div>
        </div>
        <button class="action" id="btn_thread">スレッド送信開始</button>
      </div>
    </div>

    <div id="sec-nick" class="section">
      <div class="card">
        <h2>ニックネーム変更設定</h2>
        <span class="warn">⚠️サーバーIDの入力が必要</span>
        <label>新しいニックネーム:</label>
        <input type="text" id="nick_new">
        <div class="checkbox-group">
          <input type="checkbox" id="nick_stealth"><label>ステルスモード</label>
        </div>
        <button class="action" id="btn_nick">ニックネーム変更</button>
      </div>
    </div>

    <div id="sec-event" class="section">
      <div class="card">
        <h2>イベント作成</h2>
        <span class="warn">⚠️エクスプレッション権限に未対応</span>
        <label>サーバーID： (未入力時はID設定のサーバーIDを使用)</label>
        <input type="text" id="ev_server">
        <div class="row">
          <div><label>イベント名：</label><input type="text" id="ev_name"></div>
          <div><label>ロケーション：</label><input type="text" id="ev_loc"></div>
        </div>
        <label>イベント概要：</label>
        <textarea id="ev_desc" style="min-height: 50px;"></textarea>
        <div class="row">
          <div><label>開始日時(UTC標準時) YYYY-MM-DDTHH:MM:SS:</label><input type="text" id="ev_start"></div>
          <div><label>終了日時(UTC標準時) YYYY-MM-DDTHH:MM:SS:</label><input type="text" id="ev_end"></div>
        </div>
        <div class="row">
          <div><label>イベント作成回数：</label><input type="number" id="ev_count" value="1"></div>
          <div><label>遅延時間（ミリ秒）：</label><input type="number" id="ev_delay" value="1000"></div>
        </div>
        <button class="action" id="btn_event">イベントを作成</button>
      </div>
      <div class="card">
        <h2>絵文字追加</h2>
        <span class="warn">⚠️エクスプレッション権限に未対応</span>
        <label>サーバーID (Guild ID): (未入力時はID設定のサーバーIDを使用)</label>
        <input type="text" id="em_server">
        <div class="row">
          <div><label>絵文字名 (英数字/_):</label><input type="text" id="em_name"></div>
          <div><label>絵文字URL (PNG/JPG/GIF Base64等):</label><input type="text" id="em_url"></div>
        </div>
        <button class="action" id="btn_emoji">絵文字を追加(1個/20秒)</button>
      </div>
    </div>

  </div>
  <div id="log-panel"></div>
</div>

<script>

const WORKER_URL = "https://wispy-resonance-8dfa.s103765s103765.workers.dev/";

const D = document;
const v = id => D.getElementById(id).value;
const c = id => D.getElementById(id).checked;
const lg = m => {
  const p = D.getElementById('log-panel');
  const d = new Date();
  const ts = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
  p.textContent = `[${ts}] ${m}\n` + p.textContent;
};
const wait = ms => new Promise(r => setTimeout(r, ms));
const getT = () => v('tokens').split('\n').map(t=>t.trim()).filter(Boolean);

D.querySelectorAll('.nav-btn').forEach(b => {
  b.addEventListener('click', () => {
    D.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    D.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    D.getElementById(b.dataset.target).classList.add('active');
  });
});

const req = async (ep, m, b, t) => {
  if(!WORKER_URL || WORKER_URL.includes("ここにあなたの")) { 
    lg('エラー: コード内のWorker URLが設定されていません。ソースコードを編集して設定してください。'); 
    return null; 
  }
  return fetch(WORKER_URL, {
    method: 'POST',
    body: JSON.stringify({ ep, m, h: { 'Authorization': t, 'Content-Type': 'application/json' }, b })
  });
};

const ZW = ['\u200B','\u200C','\u200D','\uFEFF','\u2060'];
const SY = ['.',',','\'','"','*','-','_','=','+','~','|','/','\\','!','?','@','#','$','%','^','&','(',')','<','>','[',']','{','}',':'];
const AL = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

const fmt = (txt) => {
  let r = txt;
  if(c('opt_zerowidth')) r = r.split('').join(ZW[Math.floor(Math.random()*ZW.length)]);
  if(c('opt_specialchar')) r = r.split('').map(x => x + (Math.random()>0.5 ? SY[Math.floor(Math.random()*SY.length)] : '')).join('');
  let rl = parseInt(v('rand_len')) || 0;
  if(c('opt_randchar') || rl > 0) {
    let len = rl > 0 ? rl : 10;
    let s = ''; for(let i=0;i<len;i++) s += AL[Math.floor(Math.random()*AL.length)];
    r += '\n' + s;
  }
  let rm = parseInt(v('msg_mentions')) || 0;
  if(rm > 0) {
    let bl = v('blacklist_id');
    let m = ''; 
    for(let i=0;i<rm;i++) {
       let randId = Math.floor(Math.random()*900000000000000000)+100000000000000000;
       if (bl && randId.toString() === bl) continue;
       m += `<@${randId}> `;
    }
    r += '\n' + m;
  }
  return r;
};


D.getElementById('btn_msg_send').onclick = async () => {
  let sd = parseInt(v('start_delay_min')) || 0;
  if(sd > 0) { lg(`${sd} 分間待機しています...`); await wait(sd * 60000); }
  
  let cnt = parseInt(v('msg_count')) || 1;
  let del = parseInt(v('msg_delay')) || 1000;
  let ch = v('channel_id');
  let toks = getT();
  
  for(let i=0; i<cnt; i++) {
    for(let t of toks) {
      let b = { content: fmt(v('msg_content')) };
      let isPoll = c('msg_poll');
      let expireSeconds = parseInt(v('poll_duration')) || 30; 

      if(isPoll) {
        b.poll = {
          question: { text: v('poll_title') },
          answers: v('poll_answers').split(',').map(x=>({poll_media:{text:x}})),
      
          duration: 1 
        };
      }
      
      try {
        let res = await req(`/channels/${ch}/messages`, 'POST', b, t);
        if(res) {
          lg(`送信 [${res.status}]`);
          
          if(res.ok && isPoll) {
            let resData = await res.json();
            let msgId = resData.id;
            
            lg(`投票作成成功！ ${expireSeconds}秒後に自動終了します...`);
            
            setTimeout(async () => {
              let exRes = await req(`/channels/${ch}/polls/${msgId}/expire`, 'POST', null, t);
              if(exRes && exRes.ok) {
                lg(`✅ 投票強制終了成功 [${exRes.status}]`);
              } else {
                lg(`❌ 投票強制終了失敗 [${exRes ? exRes.status : '不明'}]`);
              }
            }, expireSeconds * 1000); // ミリ秒に変換して待機
          }
        }
      } catch(e) {
        lg(`エラーが発生しました: ${e}`);
      }
      
      await wait(c('opt_autodelay') ? del + Math.random()*800 : del);
    }
  }
};


D.getElementById('btn_msg_type').onclick = () => {
  let ch = v('channel_id');
  getT().forEach(t => req(`/channels/${ch}/typing`, 'POST', null, t).then(res => res && lg(`入力中 [${res.status}]`)));
};

D.getElementById('btn_transfer').onclick = async () => {
  let cnt = parseInt(v('t_count')) || 1;
  let del = parseInt(v('t_delay')) || 1000;
  let toks = getT();
  for(let i=0; i<cnt; i++) {
    for(let t of toks) {
      let r = await req(`/channels/${v('t_channel')}/messages/${v('t_msg')}`, 'GET', null, t);
      if(r && r.ok) {
        let j = await r.json();
        req(`/channels/${v('channel_id')}/messages`, 'POST', { content: j.content }, t).then(res => res && lg(`転送 [${res.status}]`));
      } else if(r) { lg('転送エラー: メッセージの取得に失敗しました'); }
      await wait(del);
    }
  }
};

D.getElementById('btn_react').onclick = async () => {
  let std = v('r_std').split(',').filter(Boolean);
  let cus = v('r_cus').split(',').filter(Boolean);
  let all = [...std, ...cus];
  let [ch, msg] = v('reaction_ids').split(',');
  if (!ch || !msg) { lg('エラー: リアクション用チャンネル,メッセージIDが正しくありません'); return; }
  let del = parseInt(v('r_delay')) || 1000;
  let toks = getT();
  for(let e of all) {
    for(let t of toks) {
      req(`/channels/${ch}/messages/${msg}/reactions/${encodeURIComponent(e.trim())}/@me`, 'PUT', null, t).then(res => res && lg(`リアクション [${res.status}]`));
      await wait(del);
    }
  }
};

D.getElementById('btn_thread').onclick = async () => {
  let cnt = parseInt(v('th_count')) || 1;
  let del = parseInt(v('th_delay')) || 1000;
  let toks = getT();
  for(let i=0; i<cnt; i++) {
    for(let t of toks) {
      let b = { name: v('th_title'), type: parseInt(v('th_type')), message: { content: v('th_msg') } };
      req(`/channels/${v('channel_id')}/threads`, 'POST', b, t).then(res => res && lg(`スレッド [${res.status}]`));
      await wait(del);
    }
  }
};

D.getElementById('btn_nick').onclick = () => {
  let nn = v('nick_new');
  if(c('nick_stealth')) nn += ZW[0];
  let sid = v('server_id');
  getT().forEach(t => req(`/guilds/${sid}/members/@me`, 'PATCH', { nick: nn }, t).then(res => res && lg(`ニックネーム [${res.status}]`)));
};

D.getElementById('btn_event').onclick = async () => {
  let cnt = parseInt(v('ev_count')) || 1;
  let del = parseInt(v('ev_delay')) || 1000;
  let sid = v('ev_server') || v('server_id');
  let toks = getT();
  for(let i=0; i<cnt; i++) {
    for(let t of toks) {
      let b = { name: v('ev_name'), description: v('ev_desc'), privacy_level: 2, entity_type: 3, entity_metadata: { location: v('ev_loc') }, scheduled_start_time: v('ev_start'), scheduled_end_time: v('ev_end') };
      req(`/guilds/${sid}/scheduled-events`, 'POST', b, t).then(res => res && lg(`イベント [${res.status}]`));
      await wait(del);
    }
  }
};

D.getElementById('btn_emoji').onclick = () => {
  let sid = v('em_server') || v('server_id');
  getT().forEach(t => req(`/guilds/${sid}/emojis`, 'POST', { name: v('em_name'), image: v('em_url') }, t).then(res => res && lg(`絵文字 [${res.status}]`)));
};

lg('ステータス: 準備完了');
</script>
</body>
</html>
